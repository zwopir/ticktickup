name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: darwin/arm64
            output: ticktickup-darwin-arm64
          - os: macos-latest
            platform: darwin/amd64
            output: ticktickup-darwin-amd64
          - os: windows-latest
            platform: windows/amd64
            output: ticktickup-windows-amd64.exe
          - os: ubuntu-latest
            platform: linux/amd64
            output: ticktickup-linux-amd64

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Build
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
            wails build -platform ${{ matrix.platform }} -o ${{ matrix.output }} -tags webkit2_41
          else
            wails build -platform ${{ matrix.platform }} -o ${{ matrix.output }}
          fi
        shell: bash

      - name: Package macOS app
        if: runner.os == 'macOS'
        run: |
          cd build/bin
          zip -r ${{ matrix.output }}.zip ticktickup.app

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: build/bin/${{ matrix.output }}.zip

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: build/bin/${{ matrix.output }}

      - name: Upload artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: build/bin/${{ matrix.output }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/ticktickup-darwin-arm64/ticktickup-darwin-arm64.zip
            artifacts/ticktickup-darwin-amd64/ticktickup-darwin-amd64.zip
            artifacts/ticktickup-windows-amd64.exe/ticktickup-windows-amd64.exe
            artifacts/ticktickup-linux-amd64/ticktickup-linux-amd64
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
